<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Tracking Learning Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ==================== SCREEN: MENU ==================== -->
<div id="screen-menu" class="screen active">
  <div class="menu-bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>
  <div class="menu-content">
    <div class="menu-logo">
      <div class="logo-icon">✋</div>
      <h1 class="logo-title">HandQuiz</h1>
      <p class="logo-sub">เกมตอบคำถามด้วยนิ้วมือ</p>
    </div>

    <div class="set-picker">
      <p class="set-label">เลือกชุดคำถาม</p>
      <div id="set-list" class="set-list">
        <!-- ใส่โดย JS -->
      </div>
    </div>

    <div class="menu-actions">
      <button class="btn-primary" id="btn-start" disabled>
        <span>เริ่มเกม</span>
        <span class="btn-icon">▶</span>
      </button>
      <button class="btn-ghost" id="btn-admin">จัดการคำถาม ⚙</button>
    </div>

    <div class="menu-tip">
      <span class="tip-icon">💡</span>
      ชี้นิ้วไปโซนซ้ายหรือขวา ค้างไว้ 1 วินาทีเพื่อเลือกคำตอบ
    </div>

    <div class="user-bar">
      <span class="user-email" id="user-email"></span>
      <button class="btn-signout" id="btn-signout" onclick="signOutUser()">ออกจากระบบ</button>
    </div>
  </div>
</div>

<!-- ==================== SCREEN: GAME ==================== -->
<div id="screen-game" class="screen">

  <!-- HUD บนสุด -->
  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">คะแนน</span>
      <span class="hud-value" id="hud-score">0</span>
    </div>
    <div class="hud-item hud-center">
      <span class="hud-label">ชุด</span>
      <span class="hud-value" id="hud-set-title">-</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">ข้อ</span>
      <span class="hud-value" id="hud-progress">1/5</span>
    </div>
  </div>

  <!-- Timer bar -->
  <div class="timer-bar-wrap">
    <div class="timer-bar" id="timer-bar"></div>
  </div>

  <!-- Webcam + Canvas layer (พื้นหลังเท่านั้น) -->
  <div class="cam-wrap">
    <video id="webcam" autoplay playsinline muted style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);"></video>
    <canvas id="overlay-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;transform:scaleX(-1);z-index:2;"></canvas>

    <!-- No camera fallback -->
    <div class="no-cam" id="no-cam" style="display:none">
      <div class="no-cam-icon">📷</div>
      <div class="no-cam-title">ไม่พบกล้อง</div>
      <div class="no-cam-sub">กรุณาอนุญาตการใช้กล้อง หรือใช้แป้น A / D ในการตอบ</div>
    </div>
  </div>

  <!-- โซนคำตอบ (อยู่นอก cam-wrap เพื่อให้ z-index ทำงานถูกต้อง) -->
  <div class="answer-zone zone-left" id="zone-left">
    <div class="zone-glow"></div>
    <div class="zone-content">
      <div class="zone-label">A</div>
      <div class="zone-answer" id="ans-left">16</div>
      <div class="zone-progress-ring">
        <svg viewBox="0 0 56 56">
          <circle class="ring-bg" cx="28" cy="28" r="24"/>
          <circle class="ring-fill" id="ring-left" cx="28" cy="28" r="24"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="answer-zone zone-right" id="zone-right">
    <div class="zone-glow"></div>
    <div class="zone-content">
      <div class="zone-label">B</div>
      <div class="zone-answer" id="ans-right">32</div>
      <div class="zone-progress-ring">
        <svg viewBox="0 0 56 56">
          <circle class="ring-bg" cx="28" cy="28" r="24"/>
          <circle class="ring-fill" id="ring-right" cx="28" cy="28" r="24"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- คำถามตรงกลาง -->
  <div class="question-card" id="question-card">
    <div class="question-timer" id="question-timer">15</div>
    <div class="question-text" id="question-text">Loading...</div>
  </div>

  <!-- Feedback overlay -->
  <div class="feedback-overlay" id="feedback-overlay">
    <div class="feedback-icon" id="feedback-icon">✓</div>
    <div class="feedback-text" id="feedback-text">ถูกต้อง!</div>
    <div class="feedback-points" id="feedback-points">+100</div>
  </div>

  <button class="btn-exit" id="btn-exit">✕ ออก</button>
</div>

<!-- ==================== SCREEN: RESULT ==================== -->
<div id="screen-result" class="screen">
  <div class="result-wrap">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <h2 class="result-title">จบแล้ว!</h2>
    <div class="result-score-big" id="result-score-big">0</div>
    <p class="result-score-label">คะแนน</p>

    <div class="result-stats">
      <div class="stat-card stat-correct">
        <div class="stat-num" id="stat-correct">0</div>
        <div class="stat-label">ถูก</div>
      </div>
      <div class="stat-card stat-wrong">
        <div class="stat-num" id="stat-wrong">0</div>
        <div class="stat-label">ผิด</div>
      </div>
      <div class="stat-card stat-pct">
        <div class="stat-num" id="stat-pct">0%</div>
        <div class="stat-label">ความแม่นยำ</div>
      </div>
    </div>

    <div class="result-actions">
      <button class="btn-primary" id="btn-retry">เล่นอีกครั้ง 🔄</button>
      <button class="btn-ghost" id="btn-back-menu">กลับหน้าหลัก</button>
    </div>
  </div>
</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>

<!-- MediaPipe CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="script.js"></script>
</body>
</html>
